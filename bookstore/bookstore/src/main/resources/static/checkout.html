<!DOCTYPE html>
<html>
<head>
<title>Checkout</title>

<style>
body { font-family:Arial; background:#eaeded; }

.box {
    width:300px;
    margin:100px auto;
    background:white;
    padding:20px;
    text-align:center;
}

button {
    background:#ffd814;
    border:none;
    padding:10px;
}
</style>
</head>

<body>

<div class="box">
    <h2>Payment</h2>
    <p>Enter Card Number</p>
    <input type="text" placeholder="1234-5678-9012">
    <br><br>
    <button onclick="done()">Pay</button>
</div>

<script>
function done(){
    alert("Order Placed Successfully!");
    window.location.href="index.html";
}
</script>

</body>
</html>

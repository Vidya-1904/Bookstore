<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cart - GraspMaster</title>

<style>
:root{
    --bg:#f3f3f3;
    --text:black;
    --card:white;
}
.dark{
    --bg:#131921;
    --text:white;
    --card:#1f2a38;
}
body{
    margin:0;
    font-family:Arial;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#131921;
    color:white;
    padding:10px 20px;
}
.logo{
    display:flex;
    align-items:center;
    gap:10px;
}
.logo img{
    height:40px;
}

/* MAIN LAYOUT */
.main{
    display:flex;
    gap:20px;
    padding:20px;
}

/* LEFT CART */
.cart-section{
    flex:3;
}
.item{
    display:flex;
    gap:20px;
    background:var(--card);
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    align-items:center;
}
.item img{
    height:120px;
    border-radius:8px;
}
.details{
    flex:1;
}
.price{
    color:#b12704;
    font-weight:bold;
    font-size:18px;
}

/* QTY */
.qty{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}
.qty button{
    padding:5px 10px;
    cursor:pointer;
}
.qty span{
    font-weight:bold;
}

/* REMOVE */
.remove{
    background:red;
    color:white;
    border:none;
    padding:6px 10px;
    border-radius:5px;
    cursor:pointer;
}

/* RIGHT SUMMARY */
.summary{
    flex:1;
    background:var(--card);
    padding:20px;
    border-radius:10px;
    height:fit-content;
}
.summary h3{
    margin-bottom:10px;
}
.checkout{
    background:#ffd814;
    border:none;
    padding:12px;
    width:100%;
    font-size:16px;
    cursor:pointer;
    border-radius:5px;
}

/* EMPTY */
.empty{
    text-align:center;
    margin-top:50px;
}
.empty a{
    text-decoration:none;
    color:#007185;
}

/* THEME BTN */
.theme-btn{
    cursor:pointer;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <div class="logo">
        <img id="logo" src="logoNO.png">
        <h2>GraspMaster</h2>
    </div>

    <div>
        <button class="theme-btn" onclick="toggleTheme()">🌙</button>
    </div>
</div>

<div class="main">

    <!-- CART ITEMS -->
    <div class="cart-section" id="cart"></div>

    <!-- SUMMARY -->
    <div class="summary">
        <h3 id="total">Total: ₹0</h3>
        <button class="checkout" onclick="checkout()">Proceed to Checkout 💳</button>
    </div>

</div>

<script>

/* THEME */
let dark = localStorage.getItem("theme")==="dark";
if(dark){
    document.body.classList.add("dark");
    document.getElementById("logo").src="logoBW.png";
}

function toggleTheme(){
    dark=!dark;
    document.body.classList.toggle("dark");
    localStorage.setItem("theme",dark?"dark":"light");
    document.getElementById("logo").src = dark?"logoBW.png":"logoNO.png";
}

/* CART DATA */
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function render(){
    let html="";
    let total=0;

    if(cart.length===0){
        document.getElementById("cart").innerHTML =
        `<div class="empty">
            <h2>Your Cart is Empty 🛒</h2>
            <a href="index.html">← Continue Shopping</a>
        </div>`;
        document.getElementById("total").innerText="Total: ₹0";
        return;
    }

    cart.forEach((b,i)=>{
        total += b.price * b.qty;

        html+=`
        <div class="item">
            <img src="${b.image}">
            
            <div class="details">
                <h3>${b.title}</h3>
                <p>${b.author}</p>
                <p class="price">₹${b.price}</p>

                <div class="qty">
                    <button onclick="dec(${i})">−</button>
                    <span>${b.qty}</span>
                    <button onclick="inc(${i})">+</button>
                </div>
            </div>

            <button class="remove" onclick="removeItem(${i})">Remove</button>
        </div>`;
    });

    document.getElementById("cart").innerHTML = html;
    document.getElementById("total").innerText = "Total: ₹" + total;
}

/* FIXED QTY LOGIC */
function inc(i){
    cart[i].qty++;
    save();
}
function dec(i){
    if(cart[i].qty > 1){
        cart[i].qty--;
    }else{
        cart.splice(i,1);
    }
    save();
}
function removeItem(i){
    cart.splice(i,1);
    save();
}

function save(){
    localStorage.setItem("cart", JSON.stringify(cart));
    render();
}

/* CHECKOUT */
function checkout(){
    alert("Payment Successful 💳\nOrder Placed Successfully!");
    localStorage.removeItem("cart");
    location.reload();
}

render();

</script>

</body>
</html>

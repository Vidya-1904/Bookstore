<!DOCTYPE html>
<html>
<head>
<title>Register</title>

<style>
body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#131921;
font-family:Arial;
}
.box{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}
input{
width:100%;
padding:10px;
margin:10px 0;
}
button{
width:100%;
padding:10px;
background:#ffd814;
border:none;
cursor:pointer;
}
.alt-btn{
background:#ddd;
margin-top:8px;
}
</style>
</head>

<body>

<div class="box">
<h2>Register</h2>

<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">

<button onclick="register()">Register</button>

<p>Already have an account?</p>
<a href="login.html">
<button class="alt-btn">Back to Login</button>
</a>

</div>

<script>
function register(){
let e=document.getElementById("email").value;
let p=document.getElementById("pass").value;

localStorage.setItem("user",JSON.stringify({email:e,password:p}));
alert("Registered Successfully!");
location.href="login.html";
}
</script>

</body>
</html>
